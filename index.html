<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Sweetheart Sakshi</title>
    <style>
        :root {
            --sakshi-pink: #ff4d6d;
            --deep-pink: #c9184a;
            --hot-pink: #ff0054;
            --cake-base: #ff8fa3;
            --cake-top: #ffb3c1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff0f3;
            touch-action: none;
        }

        .page {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.5s ease-out forwards;
        }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 1. WELCOME PAGE - Deep Vibrant Pink, No White */
        #p1 {
            background: linear-gradient(180deg, #ff0a54 0%, #ff4d6d 50%, #c9184a 100%);
            color: white;
        }
        .welcome-title { 
            font-size: 3rem; 
            font-weight: bold; 
            text-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .welcome-sub { font-size: 1.1rem; opacity: 0.95; margin-bottom: 40px; }

        /* 2. CAKE DESIGN */
        .cake-box { position: relative; width: 220px; height: 220px; margin-bottom: 40px; cursor: pointer; }
        .layer {
            position: absolute; left: 50%; transform: translateX(-50%);
            border-radius: 15px 15px 5px 5px; border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .l-bottom { width: 200px; height: 90px; bottom: 0; background: var(--cake-base); z-index: 1; }
        .l-top { width: 140px; height: 70px; bottom: 90px; background: var(--cake-top); z-index: 2; }
        .candle-stick { width: 12px; height: 40px; background: #ffd166; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); border-radius: 5px; }
        .flame {
            width: 16px; height: 24px; background: #ff9800; border-radius: 50% 50% 20% 20%;
            position: absolute; top: -20px; left: -2px; animation: flicker 0.2s infinite;
            box-shadow: 0 0 15px #ff9800;
        }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* 3. CUBE SECTION - Smooth Logic */
        .cube-wrapper { 
            height: 350px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
            perspective: 1200px;
        }
        .cube { 
            width: 200px; height: 200px; 
            position: relative; 
            transform-style: preserve-3d;
            will-change: transform;
            transform: rotateX(-15deg) rotateY(15deg);
        }
        .face { 
            position: absolute; width: 200px; height: 200px; 
            background: white; border: 4px solid var(--sakshi-pink); 
            overflow: hidden; backface-visibility: visible; 
        }
        .face img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .f-front  { transform: rotateY(0deg) translateZ(100px); }
        .f-back   { transform: rotateY(180deg) translateZ(100px); }
        .f-right  { transform: rotateY(90deg) translateZ(100px); }
        .f-left   { transform: rotateY(-90deg) translateZ(100px); }
        .f-top    { transform: rotateX(90deg) translateZ(100px); }
        .f-bottom { transform: rotateX(-90deg) translateZ(100px); }

        /* 4. FINAL CARD & WISH */
        .card {
            background: white; padding: 40px 20px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; border: 2px solid #ffccd5;
        }
        .bday-text { font-size: 2.2rem; color: #880e4f; margin: 15px 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #wish-text { 
            margin-top: 20px; 
            color: var(--hot-pink); 
            font-weight: bold; 
            font-size: 1.2rem;
            display: none;
            animation: fadeIn 1s;
        }

        /* BUTTONS */
        .btn {
            background: #ff2d55; color: white; padding: 14px 40px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 30px; 
            font-weight: bold; font-size: 1rem; cursor: pointer;
            transition: 0.3s;
        }

        .heart { position: fixed; top: -20px; color: #ff4d6d; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <section class="page active" id="p1">
        <h1 class="welcome-title">Welcome Sakshi ❤️</h1>
        <p class="welcome-sub">A little surprise, just for you...</p>
        <button class="btn" onclick="nextPage('p2')">Open the Surprise</button>
    </section>

    <section class="page" id="p2">
        <h2 style="color: #880e4f;">Make a Wish & Blow!</h2>
        <div class="cake-box" onclick="blowCandle()">
            <div class="layer l-bottom"></div>
            <div class="layer l-top">
                <div class="candle-stick"><div id="flame" class="flame"></div></div>
            </div>
        </div>
        <div id="after-cake" style="display:none">
            <p style="color: #d81b60; font-weight: bold; font-size: 1.5rem;">Happy Birthday! 🎂</p>
            <button class="btn" onclick="nextPage('p3')">See Moments</button>
        </div>
    </section>

    <section class="page" id="p3">
        <h2 style="color: #880e4f;">Your Happy Moments</h2>
        <div class="cube-wrapper" id="cube-wrapper">
            <div class="cube" id="cube">
                <div class="face f-front"><img src="1.jpg"></div>
                <div class="face f-back"><img src="2.jpg"></div>
                <div class="face f-right"><img src="3.jpg"></div>
                <div class="face f-left"><img src="4.jpg"></div>
                <div class="face f-top"><img src="5.png"></div>
                <div class="face f-bottom"><img src="6.jpg"></div>
            </div>
        </div>
        <button class="btn" onclick="nextPage('p4')">Final Surprise</button>
    </section>

    <section class="page" id="p4">
        <div class="card">
            <div style="font-size: 50px;">❤️</div>
            <h1 class="bday-text">Happy Birthday, Sakshi!</h1>
            <p style="color: #880e4f; line-height: 1.6;">To the sweetest person in the world, may your day be as beautiful and bright as your smile.</p>
            
            <button class="btn" id="wish-btn" onclick="showWish()">Click for a Wish</button>
            <p id="wish-text">Wishing you a life full of joy and love! ❤️</p>
        </div>
    </section>

    <script>
        function nextPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    // Start background music when moving to the cake page (p2)
    if (id === 'p2') {
        const bgMusic = document.getElementById('bg-instrumental');
        bgMusic.play().catch(e => console.log("Music waiting for interaction"));
    }
}


        function blowCandle() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('after-cake').style.display = 'block';
        }

        function showWish() {
    document.getElementById('wish-btn').style.display = 'none';
    document.getElementById('wish-text').style.display = 'block';
    
    const bgMusic = document.getElementById('bg-instrumental');
    const finalWish = document.getElementById('bday-audio');

    // Stop the instrumental loop
    bgMusic.pause();
    bgMusic.currentTime = 0;

    // Play the final happy birthday wish
    finalWish.play().catch(error => {
        console.log("Audio playback failed:", error);
    });
}



        // --- SMOOTH CUBE LOGIC ---
        const cube = document.getElementById('cube');
        const wrapper = document.getElementById('cube-wrapper');
        
        let isDragging = false;
        let lastX, lastY;
        let currentRotateX = -15;
        let currentRotateY = 15;

        const handleStart = (e) => {
            isDragging = true;
            const pos = e.touches ? e.touches[0] : e;
            lastX = pos.pageX;
            lastY = pos.pageY;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const pos = e.touches ? e.touches[0] : e;
            const deltaX = pos.pageX - lastX;
            const deltaY = pos.pageY - lastY;

            // Sensitivity - 0.5 is usually smooth for most screens
            const speed = 0.5;

            // Swipe left (deltaX negative) -> turns cube left
            // Swipe up (deltaY negative) -> turns cube up
            currentRotateY += deltaX * speed;
            currentRotateX -= deltaY * speed;

            cube.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;

            lastX = pos.pageX;
            lastY = pos.pageY;
        };

        const handleEnd = () => { isDragging = false; };

        wrapper.addEventListener('mousedown', handleStart);
        wrapper.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        // Hearts Generator
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);
    </script>
   <!-- Background instrumental starts when she enters the surprise -->
<audio id="bg-instrumental" src="instrumental.mp3" loop></audio>

<!-- The final wish audio -->
<audio id="bday-audio" src="happy_birthday.mp3"></audio>

</body>
</html>
